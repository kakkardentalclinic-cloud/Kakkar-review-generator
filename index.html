<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body{

    padding:12px;

    border-radius:10px;
    border:1px solid #ddd;

<body>

<div class="card">

<div class="logo">⭐🦷</div>

<h1>Dr. Kakkar's - Kakkar Dental Clinic</h1>
<div class="subtitle">
Since 1966 • Thank you for trusting us ❤️
</div>

<select id="category" onchange="newReview()">
    <option value="all">All Reviews</option>
<option value="general">General Dental Treatment</option>

<option value="oral_screening">Oral Cancer Screening</option>
    </select>

<div class="review-box" id="reviewText"></div>

<div class="buttons">
<button class="next" onclick="newReview()">🔄 Next Review</button>
<button class="google" onclick="copyReview()">⭐ Copy & Review on Google</button>
</div>

<div class="footer">
Kakkar Dental Clinic • A Family Dental Clinic
</div>

</div>

<script>
  
    function generateReviews(treatment, count) {

const starters = [
"I had a great experience with",
"Highly satisfied with",
"Very happy with",
"Excellent treatment for",
"Professional care during",
"My experience with"
];

const endings = [
"Doctor explained everything very nicely.",
"Clinic hygiene and sterilization are excellent.",
"Treatment was completely painless.",
"Staff is very cooperative and polite.",
"Would definitely recommend this clinic.",
"Modern equipment and advanced care."
];

let arr = [];

for(let i=0;i<count;i++){
const s = starters[Math.floor(Math.random()*starters.length)];
const e = endings[Math.floor(Math.random()*endings.length)];
arr.push(`${s} ${treatment}. ${e}`);
}

return arr;
    }

const reviewData = {
general: generateReviews("General Dental Treatment",500),
consultation: generateReviews("Dental Consultation",500),
scaling: generateReviews("Scaling Treatment",500),
scaling_polishing: generateReviews("Scaling and Polishing",500),
whitening: generateReviews("Tooth Whitening Treatment",500),
filling: generateReviews("Dental Filling",500),
composite: generateReviews("Composite Restoration",500),
laser_filling: generateReviews("Laser Filling",500),
rct: generateReviews("Root Canal Treatment",500),
capping: generateReviews("Dental Crown Treatment",500),
extraction: generateReviews("Tooth Extraction",500),
wisdom: generateReviews("Wisdom Tooth Extraction",500),
pulpectomy: generateReviews("Pulpectomy Treatment",500),
kids_rct: generateReviews("Kids Root Canal Treatment",500),
braces: generateReviews("Orthodontic Braces",500),
aligners: generateReviews("Clear Aligners",500),
smile: generateReviews("Smile Designing",500),
fullmouth: generateReviews("Full Mouth Rehabilitation",500),
denture: generateReviews("Dentures",500),
implant: generateReviews("Dental Implants",500),
gums: generateReviews("Gum Treatment",500),
ulcers: generateReviews("Mouth Ulcer Treatment",500),
lip: generateReviews("Lip Correction",500),
fracture: generateReviews("Jaw Fracture Management",500),
trauma: generateReviews("Dental Trauma",500),
swelling: generateReviews("Facial Swelling",500),
spaceinfection: generateReviews("Space Infection",500),
pus: generateReviews("Pus Drainage",500),
cyst: generateReviews("Cyst Removal",500),
veneers: generateReviews("Dental Veneers",500),
bridge: generateReviews("Dental Bridge",500),
complete_denture: generateReviews("Complete Denture",500),
partial_denture: generateReviews("Partial Denture",500),
fmr: generateReviews("Full Mouth Reconstruction",500),
fluoride: generateReviews("Fluoride Treatment",500),
sealants: generateReviews("Pit and Fissure Sealants",500),
brushing: generateReviews("Tooth Brushing Guidance",500),
xray: generateReviews("Digital X-Ray",500),
emergency: generateReviews("Emergency Dental Treatment",500),
tmj: generateReviews("TMJ Treatment",500),
oral_surgery: generateReviews("Oral Surgery",500),
biopsy: generateReviews("Biopsy",500),
frenectomy: generateReviews("Frenectomy",500),
gingivectomy: generateReviews("Gingivectomy",500),
crown_lengthening: generateReviews("Crown Lengthening",500),
bone_grafting: generateReviews("Bone Grafting",500),
sinus_lift: generateReviews("Sinus Lift",500),
sensitivity: generateReviews("Tooth Sensitivity Treatment",500),
bad_breath: generateReviews("Bad Breath Treatment",500),
oral_screening: generateReviews("Oral Cancer Screening",500)
};

let currentReview="";

function getReviews(){
    const category =
    document.getElementById("category").value;

    if(category==="all"){
        return Object.values(reviewData).flat();
    }
    return reviewData[category];
}

function newReview(){

    const reviews = getReviews();

    if(!reviews || reviews.length===0){
        document.getElementById("reviewText").innerText =
        "No reviews available for this category.";
        return;
    }

    currentReview =
        reviews[Math.floor(Math.random()*reviews.length)];

    document.getElementById("reviewText").innerText =
        currentReview;
}

function confetti(){
    for(let i=0;i<40;i++){
        let div=document.createElement("div");
        div.innerHTML="🎉";
        div.style.position="fixed";
        div.style.left=Math.random()*100+"vw";
        div.style.top="-20px";
        div.style.fontSize="25px";
        div.style.zIndex="9999";
        document.body.appendChild(div);

        let y=0;
        const fall=setInterval(()=>{
            y+=6;
            div.style.top=y+"px";
            if(y>window.innerHeight){
                clearInterval(fall);
                div.remove();
            }
        },15);
    }
}

function copyReview(){

    navigator.clipboard.writeText(currentReview);

    confetti();

    setTimeout(()=>{
        window.open(
        "https://g.page/r/CTxgU-TLpYwzEBE/review",
        "_blank"
        );
    },700);
}

newReview();

</script>

</body>
</html>
