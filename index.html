<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kakkar Dental Clinic Reviews</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#f5f7fa,#e8f0ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:750px;
    background:#fff;
    border-radius:25px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
    text-align:center;
}

.logo{
    font-size:30px;
}

h1{
    margin:10px 0;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

select{
    padding:12px;
    width:100%;
    max-width:300px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
    margin-bottom:25px;
}

.review-box{
    background:#f7f9fc;
    border-radius:15px;
    padding:25px;
    min-height:140px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    line-height:1.7;
}

.buttons{
    margin-top:25px;
}

button{
    padding:14px 24px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    margin:8px;
}

.next{
    background:#e9edf5;
}

.google{
    background:#007bff;
    color:white;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">⭐🦷</div>

<h1>Dr. Kakkar's - Kakkar Dental Clinic</h1>
<div class="subtitle">
Since 1966 • Thank you for trusting us ❤️
</div>

<select id="category" onchange="newReview()">
    <option value="all">All Reviews</option>
<option value="general">General Dental Treatment</option>
<option value="consultation">Dental Consultation</option>
<option value="scaling">Scaling</option>
<option value="scaling_polishing">Scaling & Polishing</option>
<option value="whitening">Tooth Whitening</option>
<option value="filling">Dental Filling</option>
<option value="composite">Composite Restoration</option>
<option value="laser_filling">Laser Filling</option>
<option value="rct">Root Canal Treatment</option>
<option value="capping">Tooth Cap / Crown</option>
<option value="extraction">Tooth Extraction</option>
<option value="wisdom">Wisdom Tooth Extraction</option>
<option value="pulpectomy">Pulpectomy</option>
<option value="kids_rct">Kids Root Canal Treatment</option>
<option value="braces">Orthodontic Braces</option>
<option value="aligners">Clear Aligners</option>
<option value="smile">Smile Designing</option>
<option value="fullmouth">Full Mouth Rehabilitation</option>
<option value="denture">Dentures</option>
<option value="implant">Dental Implants</option>
<option value="gums">Gum Treatment</option>
<option value="ulcers">Mouth Ulcers</option>
<option value="lip">Lip Correction</option>
<option value="fracture">Jaw Fracture Management</option>
<option value="trauma">Dental Trauma</option>
<option value="swelling">Facial Swelling</option>
<option value="spaceinfection">Space Infection</option>
<option value="pus">Pus Drainage</option>
<option value="cyst">Cyst Removal</option>
<option value="veneers">Dental Veneers</option>
<option value="bridge">Dental Bridge</option>
<option value="complete_denture">Complete Denture</option>
<option value="partial_denture">Partial Denture</option>
<option value="fmr">Full Mouth Reconstruction</option>
<option value="fluoride">Fluoride Treatment</option>
<option value="sealants">Pit & Fissure Sealants</option>
<option value="brushing">Brushing Technique Guidance</option>
<option value="xray">Digital X-Ray</option>
<option value="emergency">Emergency Dental Treatment</option>
<option value="tmj">TMJ Treatment</option>
<option value="oral_surgery">Oral Surgery</option>
<option value="biopsy">Biopsy</option>
<option value="frenectomy">Frenectomy</option>
<option value="gingivectomy">Gingivectomy</option>
<option value="crown_lengthening">Crown Lengthening</option>
<option value="bone_grafting">Bone Grafting</option>
<option value="sinus_lift">Sinus Lift</option>
<option value="sensitivity">Sensitivity Treatment</option>
<option value="bad_breath">Bad Breath Treatment</option>
<option value="oral_screening">Oral Cancer Screening</option>
    </select>

<div class="review-box" id="reviewText"></div>

<div class="buttons">
<button class="next" onclick="newReview()">🔄 Next Review</button>
<button class="google" onclick="copyReview()">⭐ Copy & Review on Google</button>
</div>

<div class="footer">
Kakkar Dental Clinic • A Family Dental Clinic
</div>

</div>

<script>

const reviewData = {

general:[
"Bahut hi polite doctor hain. Treatment bilkul painless tha.",
"Clinic ki hygiene aur sterilization excellent hai.",
"Doctor har cheez patiently explain karte hain.",
"Modern equipment aur caring staff. Highly recommended.",
"Entire team is professional and very cooperative."
],

rct:[
"Root canal treatment bilkul comfortable raha.",
"RCT ke dauran bilkul pain nahi hua.",
"Mujhe RCT se bahut dar lagta tha lekin experience bahut smooth raha.",
"Doctor ne har step achhe se explain kiya."
],

extraction:[
"Meri wisdom tooth extraction bina dard ke hui.",
"Tooth extraction expected se bahut easy rahi.",
"Stitches ke baad bhi recovery fast rahi.",
"Akkal daant nikalwane ka experience bahut accha raha."
],

filling:[
"Filling treatment ka result natural lag raha hai.",
"Tooth filling bahut smoothly hui.",
"Broken tooth perfectly restore ho gaya.",
"Bilkul painless filling treatment."
],

denture:[
"Mere father ka denture perfectly fit hua.",
"Denture comfortable hai aur chewing bhi achhi ho gayi.",
"Doctor ne poora process patiently samjhaya.",
"Very satisfied with denture treatment."
],

kids:[
"Bachche ka treatment bahut patiently kiya gaya.",
"My child was very comfortable during treatment.",
"Doctor ka behaviour children ke saath excellent hai.",
"Kid-friendly environment and caring staff."
]

};

let currentReview="";

function getReviews(){
    const category =
    document.getElementById("category").value;

    if(category==="all"){
        return Object.values(reviewData).flat();
    }
    return reviewData[category];
}

function newReview(){
    const reviews = getReviews();
    currentReview =
        reviews[Math.floor(Math.random()*reviews.length)];

    document.getElementById("reviewText").innerText =
        currentReview;
}

function confetti(){
    for(let i=0;i<40;i++){
        let div=document.createElement("div");
        div.innerHTML="🎉";
        div.style.position="fixed";
        div.style.left=Math.random()*100+"vw";
        div.style.top="-20px";
        div.style.fontSize="25px";
        div.style.zIndex="9999";
        document.body.appendChild(div);

        let y=0;
        const fall=setInterval(()=>{
            y+=6;
            div.style.top=y+"px";
            if(y>window.innerHeight){
                clearInterval(fall);
                div.remove();
            }
        },15);
    }
}

function copyReview(){

    navigator.clipboard.writeText(currentReview);

    confetti();

    setTimeout(()=>{
        window.open(
        "https://g.page/r/CTxgU-TLpYwzEBE/review",
        "_blank"
        );
    },700);
}

newReview();

</script>

</body>
</html>
